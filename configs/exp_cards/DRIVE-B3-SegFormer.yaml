# B3: DRIVE × SegFormer-B2 (PVT-v2-B2 backbone + All-MLP decoder)
# exp_id: DRIVE-B3-SegFormer
dataset:    "DRIVE"
model:      "segformer_b2"
image_size: 512
batch_size: 2
epochs:     100
lr:         1.0e-4
scheduler:  "cosine"
seed:       42
amp:        true
loss:       "bce_dice"

segformer:
  pretrained:  false
  decoder_dim: 256
  dropout:     0.1
