# Baseline B2: DRIVE × nnU-Net 2D
# exp_id: DRIVE-B2-nnUNet
dataset:    "DRIVE"
in_channels: 3
model:      "nnunet_2d"
image_size: 512   # divisible by 32 (2^5), matches DRIVE SwinUNETR
batch_size: 2
epochs:     100
lr:         1.0e-4
scheduler:  "cosine"
seed:       42
amp:        true
loss:       "bce_dice"
nnunet:
  base_channels:    32
  n_pool:           5
  max_channels:     320
  deep_supervision: false
