# B4: OCTA500-6M × TransUNet (ViT-B/16 + CNN decoder)
# exp_id: OCTA6M-B4-TransUNet
dataset:    "OCTA500-6M"
model:      "transunet"
image_size: 384
batch_size: 4
epochs:     100
lr:         1.0e-4
scheduler:  "cosine"
seed:       42
amp:        true
loss:       "bce_dice"

transunet:
  timm_model:  "vit_base_patch16_384"
  pretrained:  false
  decoder_chs: [256, 128, 64, 16]
