# B4-VLM: ISIC2018 × TransUNet + VLM image spatial injection
# exp_id: ISIC2018-B4-TransUNet-VLM
# Note: 256px → pos_embed resized 24x24→16x16 at init (C2 fix)
dataset:     "ISIC2018"
in_channels: 3
model:       "transunet"
use_vlm:     true
image_size:  256
batch_size:  8
epochs:      1000
lr:          1.0e-4
scheduler:   "cosine"
seed:        42
amp:         true
loss:        "bce_dice"

transunet:
  timm_model:  "vit_base_patch16_384"
  pretrained:  false
  decoder_chs: [256, 128, 64, 16]

vlm:
  mode:          "image"
  vlm_dim:       512
  alpha_init:    0.1
  dummy_dataset: "ISIC2018"
