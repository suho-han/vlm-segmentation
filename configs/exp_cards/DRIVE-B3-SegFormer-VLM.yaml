# B3-VLM: DRIVE × SegFormer-B2 + VLM image spatial injection (BiomedCLIP)
# exp_id: DRIVE-B3-SegFormer-VLM
dataset:     "DRIVE"
in_channels: 3
model:       "segformer_b2"
use_vlm:     true
image_size:  512
batch_size:  2
epochs:      100
lr:          1.0e-4
scheduler:   "cosine"
seed:        42
amp:         true
loss:        "bce_dice"

segformer:
  pretrained:  false
  decoder_dim: 256
  dropout:     0.1

vlm:
  mode:          "image"
  vlm_dim:       512
  alpha_init:    0.1
  dummy_dataset: "OCTA500-6M"
