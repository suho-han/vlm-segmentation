# V1-Topo: DRIVE × SwinUNETR + VLM image + Topology-aware Loss
# exp_id: DRIVE-V1-SwinUNETR-VLM-Topology
dataset:    "DRIVE"
in_channels: 3
model:      "swinunetr_vlm_v1"
image_size: 512
batch_size: 2
epochs:     1000
lr:         1.0e-4
lr_injection: 1.0e-3
scheduler:  "cosine"
seed:       42
amp:        true
loss:       "topology_aware"
cldice_weight: 1.0
cldice_iters: 3

swinunetr:
  img_size:       512
  feature_size:   48
  use_checkpoint: false

vlm:
  mode:          "image"
  vlm_dim:       512
  alpha_init:    0.1
  dummy_dataset: "DRIVE"
