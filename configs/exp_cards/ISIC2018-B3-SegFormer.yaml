# B3: ISIC2018 × SegFormer-B2
# exp_id: ISIC2018-B3-SegFormer
dataset:     "ISIC2018"
in_channels: 3
model:       "segformer_b2"
image_size:  256
batch_size:  8
epochs:      1000
lr:          1.0e-4
scheduler:   "cosine"
seed:        42
amp:         true
loss:        "bce_dice"

segformer:
  pretrained:  false
  decoder_dim: 256
  dropout:     0.1
