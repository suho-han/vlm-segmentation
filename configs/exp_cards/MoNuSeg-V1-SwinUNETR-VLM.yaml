# V1: MoNuSeg × SwinUNETR + VLM image spatial injection
# exp_id: MoNuSeg-V1-SwinUNETR-VLM
dataset:     "MoNuSeg"
in_channels: 3
model:       "swinunetr_vlm_v1"
image_size:  256
batch_size:  8
epochs:      1000
lr:          1.0e-4
scheduler:   "cosine"
seed:        42
amp:         true
loss:        "bce_dice"

swinunetr:
  img_size:       256
  feature_size:   48
  use_checkpoint: false

vlm:
  mode:          "image"
  vlm_dim:       512
  alpha_init:    0.1
  dummy_dataset: "MoNuSeg"
